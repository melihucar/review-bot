name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build DMG and publish release
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: swift test

      - name: Build app
        run: make app
        env:
          APP_VERSION: ${{ github.ref_name }}

      - name: Package DMG
        run: ./scripts/build-dmg.sh "${{ github.ref_name }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ReviewBot-*.dmg
          generate_release_notes: true
          fail_on_unmatched_files: true
